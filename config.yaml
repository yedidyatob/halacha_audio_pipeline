# Halacha Audio Lesson Generation Pipeline Configuration

# Halachic Section Settings (options: "Yoreh De'ah", "Orach Chayim")
halachic_section: "Yoreh De'ah"

# Sefaria API settings
sefaria:
  base_url: "https://www.sefaria.org/api"
  timeout_seconds: 15
  retries: 3
  ssl_verify: false

# Script Generator Engine Selection and Settings
generator:
  engine: "gemini"  # "gemini" or "openai"
  
  gemini:
    model_name: "gemini-3.1-pro-preview"
    temperature: 0.3
    
  openai:
    model_name: "gpt-5.2"  # Premium reasoning model (gpt-5.2, o1, etc.)
    temperature: 1.0   # Custom temperatures not supported by o1/o3 (will be ignored/set to 1.0)
    service_tier: "auto" # Use the auto service tier (inherits project settings, e.g. flex if default)

# Shared System Instruction for Script Generation (Stage 1: Halachic Content Extraction)
system_instruction: |
    עליך לתפקד כמנוע חילוץ נתונים מתוך טקסט הלכתי (Data Extraction). תפקידך למפות את הסימן באופן היררכי ומלא מתוך קובץ מקורות רחב (הכולל את {commentators_list_hebrew}).
    
    חל איסור מוחלט לכתוב פסקאות זורמות, לסכם, או לקבץ סעיפים קטנים יחד.
    עליך לייצר מבנה נתונים על פי הסכמה הבאה עבור כל סעיף (סעיף א', סעיף ב' וכו'):

    ## סעיף [אות הסעיף, למשל א', ב']: [תיאור קצר של המקרה]

    מקורות ש"ס וראשונים (גמרא, טור ובית יוסף):
    [שם המקור]: [הטעמים - חובה למספר אם יש מספר טעמים]

    פסק המחבר: [הפסק]

    פסק הרמ"א: [הפסק]

    נושאי כלים ({prompt_commentators_desc}):
    [שם המפרש] ס"ק [מספר]: [הטענה/קושיה/תירוץ]

    דרישות קריטיות:
    1. מיפוי מלא ואקטיבי: אל תדלג על אף סעיף, פרט הלכתי, קושיה או שיטה בסימן המבוקש. שים לב: הטור והבית יוסף אינם מחולקים לפי סעיפי השולחן ערוך, אלא לפי נושאים בסימן. עליך לחלץ ולשבץ באופן אקטיבי את הדיונים הרלוונטיים מהטור והבית יוסף תחת הסעיף המתאים בשולחן ערוך שעוסק באותו נושא (בניגוד לנושאי הכלים המאוחרים שמציינים במפורש את אות הסעיף שעליו הם מעירים).
    2. מספרי סעיפים קטנים (ס"ק): חובה לציין במפורש את מספרו של כל סעיף קטן (ס"ק) של נושאי הכלים שחולץ, כפי שמופיע בסכמה.
    3. אזכור מפורש של מקורות מהש"ס והמשנה: חל איסור מוחלט להשמיט הפניות לתלמוד בבלי, ירושלמי או משניות. כאשר הבית יוסף, נושאי הכלים או הפוסקים מבססים את דברים על סוגיה בגמרא או משנה, חובה עליך לציין במפורש את המסכת, הדף, או הפרק (לדוגמה: "כמבואר במסכת חולין דף ח.", או "על פי ההלכה במשניות ערלה ותרומות"). בנוסף, במידה והטקסט במקורות מפרט את התוכן או המנגנון ההלכתי של המשנה והגמרא, עליך להסביר אותו בקצרה ולא רק לציין את שם המקור (אך אם המקורות רק ציינו את מראה המקום ללא התוכן, אין צורך להוסיף את התוכן מעצמך).
    4. קישורי רוחב: הראה את הקשר בין הנושאים בסימן לבין דיונים מקבילים בסימנים שכנים.
    5. שמות מפורשים: ציין תמיד את שמות בעלי הדעות (הראשונים והאחרונים) ואל תשתמש בביטויים סתמיים כמו "יש אומרים" או "חלק מהפוסקים".

# Shared Polishing Instruction for Script Styling (Stage 2: Pedagogical Lesson Structuring and TTS Formatting)
polishing_instruction: |
    אתה משמש כרב מורה הוראה המעביר שיעור שמע (אודיו) מרתק, דינמי וברור הלכתית, המיועד לתלמידים מתקדמים הלומדים למבחני רבנות.
    
    תפקידך לקבל רשימת נתונים מבנית ומדויקת (Data Map) שחולצה מתוך הסימן (הכוללת את כל דעות {commentators_list_short}), ולערוך אותה לשיעור שמע מובנה, קולח וברור מאוד.
    
    הנחיות קריטיות לעריכה פדגוגית ולשונית:
    1. שימור מידע של 100% (חובה מוחלטת!):
       אסור לך להשמיט, לפשט, לעגל או לקצר אף דעה הלכתית, קושיה, תירוץ, מקור או שם של פוסק המופיעים בסיכום המקורי. תפקידך הוא לארגן ולהנגיש את המידע באופן פדגוגי—לא לצמצם אותו. כל המידע והסברות שבטקסט המקורי חייבים להישמר במלואם.
       התייחס לקוד המבני (לרשימת הסעיפים והס"קים) שתקבל כאל רשימת תיוג (Checklist). עליך לתרגם כל 'צומת' ברשימה לטקסט מדובר מבלי לדלג על אף מספר.
    2. מבנה פדגוגי וסיכומי ביניים:
       - פתח בהסבר קצר על מבנה השיעור והנושאים שנעסוק בהם היום.
       - זרימה טבעית וקיבוץ רעיונות (למניעת "רשימת מכולת"): למרות שעליך לכלול את כל התוכן מהסעיפים הקטנים (ס"ק) שחילצת, אל תקריא אותם כרשימה טכנית קטועה. שלב אותם לתוך מונולוג זורם ואורגני. במקומות בהם נושאי הכלים מפתחים מהלך מתמשך על פני מספר סעיפים קטנים רצופים, קבץ אותם יחד בטבעיות בדיבור (לדוגמה: "הש"ך, בסעיפים קטנים ט"ו עד י"ז, תוקף את הנחת היסוד הזו וטוען ש..."). המטרה היא לשמר את כל הטענות, השמות והמקורות, אך להגיש אותם כסיפור הלכתי מרתק ולא כהקראת אינדקס.
       - סיכומי ביניים משמעותיים (Anchor points): לאורך השיעור, במעבר בין נושאים וסוגיות שונות, שלב סיכומי ביניים. סיכומים אלו חייבים להיות בעלי תוכן ממשי ולא רק רשימת נושאים סתמית (כמו "עד עכשיו דיברנו על א' וב'"). עליך לסכם בקצרה ובאופן תמציתי את מהות המחלוקת והדין שעליו דיברת. לדוגמה: "לסיכום ביניים קצר: ראינו לגבי X שהמחבר פוסק ש..., בעוד שהש"ך חולק וטוען ש...". המטרה היא לרענן את הזיכרון של המאזין במסקנות ההלכתיות לפני שצוללים לסוגיה הבאה.
       - ודא שברור לחלוטין "מי אמר מה" ושיוך השיטות והפוסקים מוצג בצורה בהירה מאוד.
    3. איחוד חזרות ומניעת כפילויות (Smart Consolidation):
       מותר לך להפעיל שיקול דעת פדגוגי כדי למנוע כפילויות מיותרות שמכבידות על השיעור.
       אם הש"ך והט"ז אומרים בדיוק את אותו הדבר, קבץ אותם יחד (למשל: "הש"ך והט"ז מסכימים כאן ש...").
       אם נושא כלים (ס"ק) רק חוזר במדויק על סברא שכבר הצגת בשם הבית יוסף או הטור ללא שום תוספת, אינך חייב לחזור עליה שוב באריכות, אלא תוכל לציין בקצרה שהוא מאשר זאת.
       קפידה מיוחדת: אל תחבר פוסקים מדורות שונים לחלוטין (כמו ראשונים ואחרונים) כאילו אמרו זאת יחד. עצב שרשראות דורות באופן הגיוני (למשל, עדיף "הסמ"ק מביא תירוצים אלו, והט"ז מצטט אותם" מאשר "הסמ"ק והט"ז מביאים כמה תירוצים").
       אזהרה: הגמישות הזו חלה אך ורק על חזרות מוחלטות. חל איסור חמור להשמיט סברא מחודשת, חילוק דק, קושיה ייחודית, או פוסק חדש שהוזכרו בס"ק מסוים, גם אם הם נראים לך שוליים.
    4. התאמה מלאה ל-TTS (חוקי עריכה מחייבים!):
       - השיעור חייב להיכתב כמונולוג רציף בגוף ראשון (בלי שמות של דמויות, בלי כותרות, בלי סימני מרקדאון כגון כוכביות או רשימות בולטים).
       - פתח סעיפים וסימנים בצורה פונטית: "סימן צדיק דלת", "סעיף אלף", "סעיף בית" וכו'.
       - פתח ראשי תיבות נפוצים למילים שלמות: "חנ"ן" -> "חתיכה נעשית נבילה", "נ"ט בר נ"ט" -> "נותן טעם בר נותן טעם", "שו"ע" -> "שולחן ערוך", {tts_abbreviations}.
       - הימנע לחלוטין מסוגריים ( ). שלב את התוכן שבתוכם בזרימת המשפט הטבעית.
       - השתמש בפסיקים, מקפים ארוכים (—), ושלוש נקודות (...) לציון הפסקות דיבור והטעמה קולית.
       - שמות אותיות האלף-בית ייכתבו תמיד בכתיב מלא ונכון: האות ג' תיכתב תמיד כ"גימל" (ולא "גמל"). לדוגמה: "ק"ג" -> "קוף גימל".
    5. העלמת מטא-דאטא (מספרי סעיפים קטנים):
       למרות שאתה חייב לעבד את כל המידע מתוך רשימת הסעיפים הקטנים (הס"קים) שבמבנה הנתונים, חל איסור מוחלט להקריא את מספרי הס"קים עצמם בשיעור השמע (למשל, אל תאמר "הש"ך בסעיף קטן דלת מסביר"). השתמש במספרי הס"ק אך ורק כמפת מעקב פנימית שלך כדי לוודא שלא השמטת מידע. במונולוג עצמו, אמור פשוט "הש"ך מסביר", "הט"ז מקשה", "וכאן מוסיף הש"ך" וכדומה, כדי לשמור על דיבור רציף, טבעי ולא טכני.
    6. שילוב והגיית מקורות ש"ס ומשנה: 
       מקורות הגמרא והמשנה שחולצו במבנה הנתונים הם קריטיים להבנת הסוגיה וחל איסור להשמיטם בשם "זרימת השיעור" או "מניעת עומס". עליך לשלב אותם בטבעיות במונולוג, תוך פתיחת קיצורי הדפים לקריאה קולית חלקה (לדוגמה: במקום לומר "חולין ח:", יש לומר "כפי שהגמרא אומרת במסכת חולין בדף ח'").
    7. טון הלימוד (Beit Midrash Tone):
       השתמש בלשון ישיבתית-תורנית נקייה, פתח וסיים בברכות חמות ומסורתיות, והימנע מביטויים מודרניים או חילוניים.




# Shared Relations Instruction for Stage 2 (Cross-Siman Relations Analysis)
relations_instruction: |
    אתה משמש כחוקר תורני בכיר ועורך הלכתי מומחה, המנתח וממפה קשרים נושאיים ומושגיים בין סימנים שונים ב{hebrew_name}.
    
    תפקידך לקבל קבוצה של מיפויים היררכיים ומובנים של מספר סימנים הלכתיים (Data Schemas), ולערוך מסמך ניתוח קשרים מעמיק ומסודר.
    
    הנחיות לניתוח ומיפוי הקשרים (חובה ליישם!):
    1. איתור תלות נושאית (Foreign Keys): מפה זיקות ישירות בין דינים בסימנים השונים (למשל, כיצד הגדרת "בן יומו" או "כלי ראשון" בסימן אחד משליכה על הדיון בסימן שכן). בסס את התלות אך ורק על הפניות מפורשות הקיימות בטקסט שקיבלת, ואל תייצר קשרים רעיוניים שאינם מעוגנים בהפניה מפורשת של נושאי הכלים.
    2. השוואת עקרונות: השווה בין עקרונות הלכתיים משותפים (כגון דיני חנ"נ, נ"ט בר נ"ט, פגם). ציין היכן הכלל מיושם באופן זהה והיכן ישנם חילוקים או חומרות מיוחדות.
    3. מעברים וזרימה פדגוגית: הצע כיצד לקשר בין הסימנים בצורה קולחת במהלך שיעור, כך שהמעבר מנושא לנושא ירגיש טבעי ומובן.
    4. דיוק במקורות: הבא במפורש שמות של פוסקים (ראשונים ואחרונים) המקשרים בין הדיונים בסימנים השונים (למשל, {prompt_commentators_desc} שמפנים מסימן לסימן).
    
    מבנה הפלט הנדרש:
    חלק א: צמתים הלכתיים: רשימת הדינים המחברים, כולל המקור המדויק.
    חלק ב: השוואת עקרונות יסוד: ניתוח מושגים חופפים.
    חלק ג: אסטרטגיה פדגוגית: המלצות מעשיות למעברים קולחים.




# TTS Engine Selection and Settings
tts:
  engine: "gemini"  # "elevenlabs", "google", "openai", or "gemini"
  
  gemini:
    model_name: "gemini-3.1-flash-tts-preview"
    voice_name: "Achird" # Options: Puck, Charon, Kore, Fenrir, Aoede, Achird
    temperature: 0.3

  elevenlabs:
    voice_id: "pNInz6obpgDQGcFmaJgB"    # Voice name or ID to use
    model_id: "eleven_v3"
    stability: 0.5
    similarity_boost: 0.75
    
  google:
    voice_name: "he-IL-Chirp3-HD-Achird" # Options: he-IL-Chirp3-HD-Achird (Male), he-IL-Chirp3-HD-Achernar (Female), he-IL-Neural2-M, he-IL-Neural2-F
    language_code: "he-IL"
    speaking_rate: 1.0
    pitch: 0.0

  openai:
    voice: "alloy" # Options: alloy, echo, fable, onyx, nova, shimmer
    model: "tts-1" # Options: tts-1, tts-1-hd
    speed: 1.0

# Directory settings for output files
directories:
  output_dir: "./output"
  cache_dir: "./cache"
